
  <body style="margin:0;padding:0;background-color:#0f172a;font-family:Inter,Segoe UI,Arial,sans-serif;color:#e5e7eb;">
    <div style="margin:0 auto;padding:32px 16px;max-width:640px;">
      <div style="text-align:center;margin-bottom:20px;">
        <div style="font-size:28px;font-weight:700;letter-spacing:0.2px;color:#ffffff;">
          CineScope
        </div>
        <div style="margin-top:6px;font-size:14px;line-height:1.5;color:#94a3b8;">
          Find your next watch
        </div>
      </div>

      <div style="background:linear-gradient(180deg,#111827 0%,#0b1220 100%);border:1px solid #1f2937;border-radius:18px;padding:32px;box-shadow:0 20px 60px rgba(0,0,0,0.35);">
        <div style="font-size:24px;font-weight:700;line-height:1.3;color:#ffffff;margin-bottom:12px;">
          Verify your email
        </div>

        <div style="font-size:15px;line-height:1.7;color:#cbd5e1;margin-bottom:24px;">
          Welcome to CineScope. Please confirm your email address to activate your account.
        </div>

        <div style="text-align:center;margin:28px 0;">
          <a
            href="{{ .ConfirmationURL }}"
            style="display:inline-block;padding:14px 22px;border-radius:12px;background:linear-gradient(135deg,#7c3aed 0%,#4f46e5 100%);color:#ffffff;text-decoration:none;font-size:15px;font-weight:700;"
          >
            Confirm email
          </a>
        </div>

        <div style="font-size:13px;line-height:1.7;color:#94a3b8;margin-top:8px;">
          If you did not create this account, you can safely ignore this email.
        </div>
      </div>

      <div style="text-align:center;font-size:12px;line-height:1.6;color:#64748b;margin-top:18px;">
        Sent by CineScope
      </div>
    </div>
  </body>
